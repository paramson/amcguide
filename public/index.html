<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AMC Mock Exam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap');
:root{
  --ink:#1B2A2F; --muted:#5C6B66; --paper:#F4F5F2; --card:#FFFFFF; --line:#DCDDD6;
  --primary:#2C6E63; --primary-deep:#1F4E47; --correct:#3F7E6B; --incorrect:#B5654C; --amber:#C99A3C;
  --serif:'Spectral',ui-serif,Georgia,serif; --sans:'Manrope',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,.serif{font-family:var(--serif);letter-spacing:-.01em;margin:0}
p{margin:0}
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px}
.btn{font-family:var(--sans);font-weight:600;font-size:15px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;transition:transform .12s ease,background .15s ease;color:#fff;background:var(--primary)}
.btn:hover{background:var(--primary-deep)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.5;cursor:default}
.btn[disabled]:hover{background:var(--primary)}
.ghost{background:transparent;color:var(--muted);font-weight:600;border:none;cursor:pointer;font-size:14px;font-family:var(--sans);padding:6px}
.ghost:hover{color:var(--ink)}
.input{width:100%;font-family:var(--sans);font-size:15px;padding:13px 15px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}
.input:focus{border-color:var(--primary)}
.opt{display:flex;gap:14px;align-items:flex-start;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:border-color .12s,background .12s;font-size:15px;color:var(--ink);font-family:var(--sans);margin-bottom:10px}
.opt:hover{border-color:var(--primary)}
.opt.sel{border-color:var(--primary);background:#F0F5F3}
.opt.correct{border-color:var(--correct);background:#EEF4F1}
.opt.wrong{border-color:var(--incorrect);background:#F7EDE9}
.opt[disabled]{cursor:default}
.chip{flex:none;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-weight:700;font-size:13px;background:var(--paper);border:1px solid var(--line)}
.opt.sel .chip{background:var(--primary);color:#fff;border-color:var(--primary)}
.opt.correct .chip{background:var(--correct);color:#fff;border-color:var(--correct)}
.opt.wrong .chip{background:var(--incorrect);color:#fff;border-color:var(--incorrect)}
table.dt{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
table.dt th,table.dt td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--line)}
table.dt th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
table.dt td.ref{color:var(--muted);font-variant-numeric:tabular-nums}
.fb{margin-top:18px;border-radius:13px;overflow:hidden;animation:slidein .25s ease}
@keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fb-head{padding:12px 18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.fb-head small{font-weight:500;opacity:.9}
.fb-body{padding:16px 18px;background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 13px 13px}
.fb-row{padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.fb-row:last-child{border-bottom:none}
.evi{display:inline-flex;align-items:center;gap:7px;font-size:13px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 11px;margin:4px 6px 0 0}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.pearl{margin-top:14px;padding:12px 15px;background:#FBF6EA;border:1px solid #EAD9AE;border-radius:10px;font-size:14px}
.meter{position:relative;height:46px;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.meter-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,var(--primary-deep),var(--primary));transition:width 1.1s cubic-bezier(.16,1,.3,1)}
.meter-pass{position:absolute;top:-6px;bottom:-6px;left:50%;width:2px;background:var(--amber);z-index:3}
.meter-pass span{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--amber);font-weight:700;white-space:nowrap}
.meter-val{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:var(--serif);font-size:22px;color:#fff;font-weight:600;z-index:2}
.meter-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
.pbar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:18px}
.pbar>div{height:100%;background:var(--primary);transition:width .3s ease}
.modecard{cursor:pointer;transition:border-color .15s,transform .15s}
.modecard:hover{border-color:var(--primary);transform:translateY(-2px)}
.ecg{position:absolute;inset:0;width:100%;height:100%;opacity:.10;z-index:0;pointer-events:none}
.ecg path{stroke:var(--primary);fill:none;stroke-width:2;stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 3s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.row{display:flex;justify-content:space-between;align-items:center}
@media (max-width:560px){.wrap{padding:16px 14px 70px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

var QUESTIONS = [
 {id:"AM1",group:"adult_medicine",system:"Gastroenterology",difficulty:-0.2,
  stem:"A 68-year-old man has three months of fatigue and exertional breathlessness. There is no overt bleeding and no change in bowel habit. Examination shows conjunctival pallor; abdominal and rectal examination are normal.",
  leadIn:"Which one of the following is the most appropriate next step?",
  data:[{p:"Haemoglobin",v:"92 g/L",r:"130-180"},{p:"MCV",v:"74 fL",r:"80-100"},{p:"Ferritin",v:"8 ug/L",r:"30-300"}],
  options:[{id:"A",text:"Commence oral iron and review in three months"},{id:"B",text:"Bidirectional endoscopy (gastroscopy and colonoscopy)"},{id:"C",text:"Coeliac serology"},{id:"D",text:"Faecal occult blood test"},{id:"E",text:"Bone marrow biopsy"}],
  answer:"B",
  fb:{correct:"Iron-deficiency anaemia in a man (or postmenopausal woman) is gastrointestinal blood loss until proven otherwise and mandates investigation of both GI tracts to exclude malignancy.",
   distractors:{A:"Replacing iron without finding the source masks and delays diagnosis of an occult GI cancer.",C:"Coeliac disease is worth testing but does not exclude malignancy and is not the priority first step here.",D:"FOBT is a screening tool; once deficiency has established the need for direct visualisation it adds only delay.",E:"The cause is peripheral loss, not a marrow production problem, so marrow biopsy is not indicated."},

   evidence:[{source:"GESA iron deficiency",strength:"guideline_supported"},{source:"RACGP guidance",strength:"guideline_supported"}]}},
 {id:"AM2",group:"adult_medicine",system:"Cardiology",difficulty:0.3,
  stem:"A 74-year-old woman is found to have atrial fibrillation on a routine ECG. She is asymptomatic and haemodynamically stable. She has hypertension and type 2 diabetes. Her CHA2DS2-VASc score is 4.",
  leadIn:"Which one of the following is most appropriate to reduce her stroke risk?",
  data:null,
  options:[{id:"A",text:"Aspirin 100 mg daily"},{id:"B",text:"A direct oral anticoagulant (e.g. apixaban)"},{id:"C",text:"Clopidogrel 75 mg daily"},{id:"D",text:"No antithrombotic therapy"},{id:"E",text:"Aspirin plus clopidogrel"}],
  answer:"B",
  fb:{correct:"With a CHA2DS2-VASc of 4, oral anticoagulation is indicated, and a DOAC is preferred over warfarin for most patients without mechanical valves or moderate-severe mitral stenosis.",
   distractors:{A:"Aspirin is substantially less effective than anticoagulation for stroke prevention in AF and is not recommended for this indication.",C:"Single antiplatelet therapy does not provide adequate stroke protection in AF.",D:"Omitting therapy leaves a high-risk patient unprotected.",E:"Dual antiplatelet therapy adds bleeding risk without matching anticoagulation efficacy in AF."},
   pearl:"In AF, stroke prevention is anticoagulation, not antiplatelets. Aspirin is the seductive wrong answer.",

 {id:"AM3",group:"adult_medicine",system:"Endocrinology",difficulty:0.6,
  stem:"A 61-year-old man with type 2 diabetes has an HbA1c of 8.4% on maximal metformin. He has established heart failure with reduced ejection fraction and stage 3 chronic kidney disease.",
  leadIn:"Which one of the following is the most appropriate addition?",
  data:null,
  options:[{id:"A",text:"A sulfonylurea (e.g. gliclazide)"},{id:"B",text:"An SGLT2 inhibitor (e.g. empagliflozin)"},{id:"C",text:"A thiazolidinedione (e.g. pioglitazone)"},{id:"D",text:"Increase metformin above the maximum dose"},{id:"E",text:"Premixed insulin twice daily"}],
  answer:"B",
  fb:{correct:"SGLT2 inhibitors lower glucose and independently reduce heart-failure hospitalisation and slow CKD progression, making them the agent of choice in this comorbidity profile.",
   distractors:{A:"Sulfonylureas lower glucose but carry hypoglycaemia and weight gain and offer no cardiorenal benefit.",C:"Thiazolidinediones cause fluid retention and worsen heart failure.",D:"Exceeding the maximum metformin dose adds toxicity, not efficacy, and metformin needs caution in CKD.",E:"Insulin is effective but not first-choice here when an agent with cardiorenal benefit is available."},
   pearl:"Diabetes + heart failure or CKD steers you to an SGLT2 inhibitor for its organ-protective effects, beyond glucose lowering.",
   evidence:[{source:"RACGP/ADS T2DM guidance",strength:"guideline_supported"}]}},
 {id:"AM4",group:"adult_medicine",system:"Nephrology",difficulty:0.1,
  stem:"A 70-year-old man on an ACE inhibitor and spironolactone presents unwell. His ECG shows peaked T waves and broadening of the QRS complex.",
  leadIn:"Which one of the following is the most appropriate immediate step?",
  data:[{p:"Potassium",v:"7.1 mmol/L",r:"3.5-5.2"},{p:"Creatinine",v:"210 umol/L",r:"60-110"}],
  options:[{id:"A",text:"Intravenous calcium gluconate"},{id:"B",text:"Intravenous insulin with dextrose"},{id:"C",text:"Nebulised salbutamol"},{id:"D",text:"Oral resonium (cation exchange resin)"},{id:"E",text:"Urgent haemodialysis"}],
  answer:"A",
  fb:{correct:"With ECG changes of hyperkalaemia, IV calcium is given first to stabilise the myocardial membrane and prevent arrhythmia; it acts within minutes.",
   distractors:{B:"Insulin-dextrose shifts potassium intracellularly and is given, but after calcium because it does not protect the heart immediately.",C:"Salbutamol also shifts potassium but is adjunctive and slower than membrane stabilisation.",D:"Resin removes potassium slowly over hours and has no role in the acute emergency.",E:"Dialysis may be needed but is not the immediate first step when the heart is at risk now."},
   pearl:"Hyperkalaemia with ECG changes: protect the heart first (calcium), then shift (insulin/dextrose), then remove (dialysis/resin).",
   evidence:[{source:"eTG hyperkalaemia",strength:"guideline_supported"}]}},
 {id:"AM5",group:"adult_medicine",system:"Endocrinology",difficulty:0.0,
  stem:"A 22-year-old woman with type 1 diabetes presents with vomiting, abdominal pain and deep sighing breathing. She is drowsy. Capillary ketones are elevated and venous pH is 7.10.",
  leadIn:"Which one of the following is the most appropriate first step in management?",
  data:[{p:"Glucose",v:"28 mmol/L",r:"3.0-7.8"},{p:"Venous pH",v:"7.10",r:"7.35-7.45"},{p:"Potassium",v:"3.4 mmol/L",r:"3.5-5.2"}],
  options:[{id:"A",text:"Intravenous fixed-rate insulin infusion"},{id:"B",text:"Intravenous 0.9% sodium chloride"},{id:"C",text:"Intravenous sodium bicarbonate"},{id:"D",text:"Intravenous potassium replacement alone"},{id:"E",text:"Subcutaneous rapid-acting insulin"}],

 {id:"AM6",group:"adult_medicine",system:"Cardiology",difficulty:0.4,
  stem:"A 58-year-old man arrives at a metropolitan emergency department with 90 minutes of crushing central chest pain. His ECG shows ST elevation in leads II, III and aVF. The hospital has a 24-hour cardiac catheter laboratory.",
  leadIn:"Which one of the following is the most appropriate reperfusion strategy?",
  data:null,
  options:[{id:"A",text:"Primary percutaneous coronary intervention"},{id:"B",text:"Intravenous thrombolysis"},{id:"C",text:"Aspirin and clopidogrel alone"},{id:"D",text:"Exercise stress test"},{id:"E",text:"CT coronary angiography"}],

 {id:"AS1",group:"adult_surgery",system:"Vascular",difficulty:0.5,
  stem:"A 72-year-old man presents with sudden severe back and abdominal pain and feels faint. He is pale and sweaty with a tender, pulsatile epigastric mass. BP is 82/50 mmHg and pulse is 120/min.",

 {id:"AS2",group:"adult_surgery",system:"General surgery",difficulty:0.2,
  stem:"A 64-year-old woman with previous open hysterectomy presents with colicky central abdominal pain, vomiting, distension and absolute constipation. Abdominal X-ray shows dilated small-bowel loops with air-fluid levels. She is haemodynamically stable with a soft, non-peritonitic abdomen.",
  leadIn:"Which one of the following is the most appropriate initial management?",
  data:null,

  fb:{correct:"Adhesional small-bowel obstruction without signs of strangulation or peritonitis is managed initially with NG decompression, IV fluids and bowel rest while monitoring for resolution.",
   distractors:{B:"Surgery is reserved for failure of conservative management or features of strangulation or perforation.",C:"Laxatives are inappropriate and potentially harmful in mechanical obstruction.",D:"Gastroscopy has no role in small-bowel obstruction.",E:"Discharging an obstructed patient risks bowel ischaemia and perforation."},
   pearl:"Uncomplicated adhesional SBO: drip and suck first; operate for strangulation, peritonitis or failure to settle.",

 {id:"AS3",group:"adult_surgery",system:"Vascular",difficulty:0.4,
  stem:"A 69-year-old man with atrial fibrillation presents with two hours of a sudden, painful, cold, pale right leg. The limb is numb with absent foot pulses but no fixed mottling.",
  leadIn:"Apart from analgesia, which one of the following is the most appropriate immediate step?",
  data:null,
  options:[{id:"A",text:"Intravenous heparin and urgent vascular referral"},{id:"B",text:"Compression bandaging and elevation"},{id:"C",text:"Outpatient arterial duplex in one week"},{id:"D",text:"Oral aspirin and discharge"},{id:"E",text:"Below-knee amputation"}],
  answer:"A",
  fb:{correct:"Acute limb ischaemia, likely embolic given the AF, needs immediate systemic anticoagulation with heparin and urgent vascular assessment for revascularisation to salvage the limb.",

 {id:"AS4",group:"adult_surgery",system:"Breast surgery",difficulty:-0.3,
  stem:"A 58-year-old woman feels a firm, painless, irregular lump in her left breast that has been present for six weeks. There is no skin change and no nipple discharge.",
  leadIn:"Which one of the following is the most appropriate approach?",
  data:null,
  options:[{id:"A",text:"Triple assessment (clinical examination, imaging and biopsy)"},{id:"B",text:"Reassure and review in six months"},{id:"C",text:"Prescribe antibiotics"},{id:"D",text:"Mammogram alone"},{id:"E",text:"Excision biopsy without prior imaging"}],

 {id:"WH1",group:"womens_health",system:"Early pregnancy",difficulty:0.3,
  stem:"A 27-year-old woman with six weeks of amenorrhoea presents with sudden severe right iliac fossa pain and shoulder-tip pain. She is pale with BP 84/52 mmHg and pulse 124/min. Urine beta-hCG is positive and transvaginal ultrasound shows an empty uterus with free fluid in the pelvis.",

 {id:"WH2",group:"womens_health",system:"Obstetrics",difficulty:0.4,

  data:null,

 {id:"WH3",group:"womens_health",system:"Gynaecology",difficulty:-0.1,
  stem:"A 62-year-old woman, ten years postmenopausal and not on hormone therapy, reports a single episode of vaginal bleeding. Examination is unremarkable.",
  leadIn:"Which one of the following is the most appropriate next step?",
  data:null,
  options:[{id:"A",text:"Transvaginal ultrasound and endometrial sampling"},{id:"B",text:"Reassurance and review if it recurs"},{id:"C",text:"Commence topical oestrogen"},{id:"D",text:"Repeat cervical screening test only"},{id:"E",text:"Prescribe tranexamic acid"}],

 {id:"CH1",group:"child_health",system:"Respiratory",difficulty:-0.2,
  stem:"A 5-month-old infant has two days of coryza, cough and wheeze. He is feeding at about three-quarters of normal, has mild subcostal recession, oxygen saturation of 95% in air and scattered crackles and wheeze. He is alert and well perfused.",
  leadIn:"Which one of the following is the most appropriate management?",
  data:null,
  options:[{id:"A",text:"Supportive care with feeding and observation"},{id:"B",text:"Oral amoxicillin"},{id:"C",text:"Nebulised salbutamol"},{id:"D",text:"Oral prednisolone"},{id:"E",text:"Nebulised adrenaline and discharge"}],
  answer:"A",
  fb:{correct:"This is mild bronchiolitis, a viral illness in which management is supportive - maintaining hydration and feeding with observation. Most infants do not need pharmacological treatment.",

 {id:"CH2",group:"child_health",system:"Infectious disease",difficulty:0.2,
  stem:"A 3-year-old is brought in febrile, lethargic and irritable. There is a rapidly spreading non-blanching petechial rash. He is tachycardic with cool peripheries and prolonged capillary refill.",

  data:null,

  answer:"A",
  fb:{correct:"A febrile child with a non-blanching rash and shock has meningococcal sepsis until proven otherwise; parenteral antibiotics must be given immediately alongside resuscitation, without delay.",

/* ============================ ENGINE ============================ */
var GRID=[]; for(var t=-4;t<=4.0001;t+=0.1){GRID.push(Math.round(t*10)/10);}
function estimateTheta(resps){
  if(!resps.length) return {theta:0,se:1};
  var post=GRID.map(function(th){
    var L=Math.exp(-(th*th)/2);
    for(var i=0;i<resps.length;i++){var p=1/(1+Math.exp(-(th-resps[i].b)));L*=resps[i].correct?p:(1-p);}
    return L;
  });
  var Z=post.reduce(function(a,b){return a+b;},0)||1;
  var mean=0; GRID.forEach(function(th,i){mean+=th*post[i];}); mean/=Z;
  var v=0; GRID.forEach(function(th,i){v+=(th-mean)*(th-mean)*post[i];}); v/=Z;
  return {theta:mean,se:Math.sqrt(v)};
}
function thetaToScore(th){return Math.max(0,Math.min(500,Math.round(250+th*60)));}
function targetCounts(len){
  var w={adult_medicine:0.30,adult_surgery:0.20,womens_health:0.125,child_health:0.125,mental_health:0.125,population_health:0.125};
  var o={}; Object.keys(w).forEach(function(g){o[g]=Math.round(w[g]*len);}); return o;
}
function selectNext(answered,theta,mode,seen){
  var used=answered.map(function(a){return a.qid;});
  var rem=QUESTIONS.filter(function(q){return used.indexOf(q.id)<0;});
  if(!rem.length) return null;
  if(mode==="exam"){
    var tgt=targetCounts(Math.min(10,QUESTIONS.length));
    var def={}; rem.forEach(function(q){def[q.group]=(tgt[q.group]||0)-(seen[q.group]||0);});
    var maxDef=Math.max.apply(null,Object.keys(def).map(function(k){return def[k];}));
    if(maxDef>0){var want=Object.keys(def).filter(function(g){return def[g]===maxDef;}); rem=rem.filter(function(q){return want.indexOf(q.group)>=0;});}
  } else {
    var acc={}; answered.forEach(function(a){acc[a.group]=acc[a.group]||{c:0,n:0};acc[a.group].n++;if(a.correct)acc[a.group].c++;});
    var seenG=Object.keys(acc);
    if(seenG.length){
      var worst=null,wr=2;
      seenG.forEach(function(g){var r=acc[g].c/acc[g].n; if(r<wr && rem.some(function(q){return q.group===g;})){wr=r;worst=g;}});
      if(worst && wr<1) rem=rem.filter(function(q){return q.group===worst;});
    }
  }
  rem.sort(function(a,b){return Math.abs(a.difficulty-theta)-Math.abs(b.difficulty-theta);});
  return rem[0];
}

/* ============================ STATE ============================ */
var state={screen:"login",user:null,mode:"practice",answered:[],choice:null,revealed:false,current:null,last:null,openReview:null};
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var examLen=Math.min(10,QUESTIONS.length);

/* ============================ RENDER ============================ */
function meterHTML(score){
  return '<div class="meter"><div class="meter-fill" data-w="'+(score/500*100)+'"></div>'
    +'<div class="meter-pass"><span>pass 250</span></div><div class="meter-val">'+score+'</div></div>'
    +'<div class="meter-scale"><span>0</span><span>AMC ability scale</span><span>500</span></div>';
}
function dataTableHTML(rows){
  var body=rows.map(function(r){return '<tr><td>'+esc(r.p)+'</td><td><b>'+esc(r.v)+'</b></td><td class="ref">'+esc(r.r)+'</td></tr>';}).join("");
  return '<table class="dt"><thead><tr><th>Investigation</th><th>Result</th><th>Reference</th></tr></thead><tbody>'+body+'</tbody></table>';
}
function feedbackHTML(q,choice){
  var correct=choice===q.answer;
  var rows='<div class="fb-row"><b>Why '+q.answer+':</b> '+esc(q.fb.correct)+'</div>';
  if(!correct && choice) rows+='<div class="fb-row"><b>Your answer ('+choice+'):</b> '+esc(q.fb.distractors[choice])+'</div>';
  var evi=q.fb.evidence.map(function(e){return '<span class="evi"><span class="dot" style="background:'+STRENGTH[e.strength].dot+'"></span>'+esc(e.source)+'</span>';}).join("");
  return '<div class="fb"><div class="fb-head" style="background:'+(correct?"var(--correct)":"var(--incorrect)")+'">'
    +(correct?"Correct":"Not quite")+'<small>- best answer is '+q.answer+'</small></div>'
    +'<div class="fb-body">'+rows+'<div class="pearl">&#128161; '+esc(q.fb.pearl)+'</div>'
    +'<div style="margin-top:14px"><div class="eyebrow" style="margin-bottom:6px">Evidence</div>'+evi+'</div></div></div>';
}
function radarSVG(data){
  var n=data.length,cx=160,cy=145,R=98;
  function ang(i){return (-90+i*360/n)*Math.PI/180;}
  function pt(i,r){return [cx+Math.cos(ang(i))*r, cy+Math.sin(ang(i))*r];}
  var s="";
  [25,50,75,100].forEach(function(val){
    var pts=data.map(function(_,i){var p=pt(i,R*val/100);return p[0].toFixed(1)+","+p[1].toFixed(1);}).join(" ");
    s+='<polygon points="'+pts+'" fill="none" stroke="#DCDDD6" stroke-width="1"/>';
  });
  data.forEach(function(d,i){var p=pt(i,R);s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#DCDDD6"/>';});
  var poly=data.map(function(d,i){var p=pt(i,R*d.acc/100);return p[0].toFixed(1)+","+p[1].toFixed(1);}).join(" ");
  s+='<polygon points="'+poly+'" fill="#2C6E63" fill-opacity="0.28" stroke="#2C6E63" stroke-width="2"/>';
  data.forEach(function(d,i){var p=pt(i,R*d.acc/100);s+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="#2C6E63"/>';});
  data.forEach(function(d,i){var p=pt(i,R+16);var anc=Math.abs(p[0]-cx)<8?"middle":(p[0]>cx?"start":"end");s+='<text x="'+p[0].toFixed(1)+'" y="'+(p[1]+3).toFixed(1)+'" font-size="10" fill="#5C6B66" text-anchor="'+anc+'">'+esc(d.label)+' '+d.acc+'%</text>';});
  return '<svg viewBox="0 0 320 290" width="100%" style="max-width:360px;display:block;margin:0 auto">'+s+'</svg>';
}

function loginHTML(){
  return '<div class="wrap" style="padding-top:70px;position:relative">'
   +'<svg class="ecg" viewBox="0 0 800 120" preserveAspectRatio="none" aria-hidden="true"><path d="M0,60 L180,60 L200,60 L210,30 L220,90 L230,20 L242,60 L420,60 L440,60 L450,35 L460,85 L470,25 L482,60 L800,60"/></svg>'
   +'<div style="position:relative;z-index:1">'
   +'<div class="eyebrow">AMC CAT MCQ preparation</div>'
   +'<h1 style="font-size:34px;margin:8px 0 6px">Sit the mock. Learn from the feedback.</h1>'
   +'<p style="color:var(--muted);max-width:460px">Adaptive practice for the Australian Medical Council MCQ, scored the way the real exam scores - by ability, not by count.</p>'
   +'<div class="card" style="padding:22px;margin-top:22px;max-width:420px">'
   +'<label class="eyebrow">Email</label>'
   +'<input id="emailInput" class="input" style="margin:8px 0 14px" type="email" placeholder="you@example.com"/>'
   +'<button class="btn" style="width:100%" onclick="continueLogin()">Continue</button>'
   +'<div style="text-align:center;margin-top:12px"><button class="ghost" onclick="guestLogin()">Continue as guest</button></div></div>'
   +'<p style="font-size:12px;color:var(--muted);margin-top:14px;max-width:420px">Demo sign-in (in-memory). Production uses Supabase Auth with email and Google sign-in.</p>'
   +'</div></div>';
}
function homeHTML(){
  var lastBlock = state.last ? '<div class="card" style="padding:18px;margin-top:8px"><div class="eyebrow" style="margin-bottom:8px">Your last '+(state.last.mode==="exam"?"exam":"practice")+' result</div>'+meterHTML(state.last.score)+'</div>' : '';
  return '<div class="wrap">'
   +'<div class="row"><div class="eyebrow">Signed in &middot; '+esc(state.user)+'</div><button class="ghost" onclick="signOut()">Sign out</button></div>'
   +'<h1 style="font-size:30px;margin:10px 0 4px">Choose how you want to practise</h1>'
   +'<p style="color:var(--muted)">'+QUESTIONS.length+' questions across all six AMC patient groups.</p>'
   +lastBlock
   +'<div class="card modecard" style="padding:22px;margin-top:18px" onclick="startMode(\'exam\')">'
   +'<div class="eyebrow" style="color:var(--primary)">Exam simulation</div>'
   +'<h2 style="font-size:21px;margin:6px 0">Sit a timed adaptive mini-mock</h2>'
   +'<p style="color:var(--muted);font-size:14px">Ten questions, forward-only, no feedback until the end - like the real CAT. Difficulty adapts to your answers and you get an ability score on the 0-500 scale.</p></div>'
   +'<div class="card modecard" style="padding:22px;margin-top:14px" onclick="startMode(\'practice\')">'
   +'<div class="eyebrow" style="color:var(--primary)">Practice &amp; learn</div>'
   +'<h2 style="font-size:21px;margin:6px 0">Immediate feedback after every answer</h2>'
   +'<p style="color:var(--muted);font-size:14px">Full evidence-based explanation as you go, including why each wrong option is wrong. The system steers toward your weaker areas. Finish whenever you like.</p></div>'
   +'</div>';
}
function runHTML(){
  var q=state.current, G=GROUPS[q.group];
  var total=state.mode==="exam"?examLen:QUESTIONS.length;
  var idx=state.answered.length+1;
  var opts=q.options.map(function(o){
    var cls="opt", dis=false;
    if(state.mode==="practice" && state.revealed){
      dis=true;
      if(o.id===q.answer) cls+=" correct";
      else if(o.id===state.choice) cls+=" wrong";
    } else if(state.choice===o.id) cls+=" sel";
    return '<button class="'+cls+'" '+(dis?"disabled":'onclick="selectOpt(\''+o.id+'\')"')+'><span class="chip">'+o.id+'</span><span>'+esc(o.text)+'</span></button>';
  }).join("");
  var btnLabel=state.mode==="exam"?"Lock answer &amp; continue":(state.revealed?"Next question":"Check answer");
  var note=state.mode==="exam"?'<span style="margin-left:14px;font-size:13px;color:var(--muted)">No review once locked - like the real exam.</span>':'';
  var fb=(state.mode==="practice" && state.revealed)?feedbackHTML(q,state.choice):"";
  return '<div class="wrap">'
   +'<div class="row" style="margin-bottom:6px"><span class="eyebrow">'+(state.mode==="exam"?"Exam simulation":"Practice &amp; learn")+' &middot; '+idx+' / '+total+'</span>'
   +'<button class="ghost" onclick="quit()">'+(state.mode==="exam"?"Abandon":"Finish session")+'</button></div>'
   +'<div class="pbar"><div style="width:'+((idx-1)/total*100)+'%"></div></div>'
   +'<span class="evi" style="margin-bottom:14px"><span class="dot" style="background:'+G.color+'"></span>'+esc(G.label)+' &middot; '+esc(q.system)+'</span>'
   +'<p style="font-size:16.5px;line-height:1.6">'+esc(q.stem)+'</p>'
   +(q.data?dataTableHTML(q.data):"")
   +'<p style="font-weight:600;margin:14px 0">'+esc(q.leadIn)+'</p>'
   +'<div>'+opts+'</div>'+fb
   +'<div style="margin-top:20px"><button class="btn" '+(state.choice?"":"disabled")+' onclick="submit()">'+btnLabel+'</button>'+note+'</div>'
   +'</div>';
}
function resultsHTML(){
  var a=state.answered;
  var theta=estimateTheta(a.map(function(x){return {b:x.b,correct:x.correct};})).theta;
  var score=thetaToScore(theta);
  var nCorrect=a.filter(function(x){return x.correct;}).length;
  var byG={}; a.forEach(function(x){byG[x.group]=byG[x.group]||{c:0,n:0};byG[x.group].n++;if(x.correct)byG[x.group].c++;});
  var radar=Object.keys(byG).map(function(g){return {label:GROUPS[g].short,acc:Math.round(byG[g].c/byG[g].n*100)};});
  var worst=null,wr=2; Object.keys(byG).forEach(function(g){var r=byG[g].c/byG[g].n;if(r<wr){wr=r;worst=g;}});
  var radarBlock = radar.length>=3 ? '<div class="card" style="padding:16px;margin-top:16px"><div class="eyebrow" style="margin-bottom:8px">Accuracy by patient group</div>'+radarSVG(radar)+'</div>' : '';
  var weakBlock = (worst && wr<1) ? '<div class="card" style="padding:18px;margin-top:16px;border-color:#EAD9AE;background:#FBF6EA"><div class="eyebrow" style="color:var(--amber)">Where to focus next</div><p style="margin-top:6px;font-size:14px">Your weakest area was <b>'+esc(GROUPS[worst].label)+'</b> ('+Math.round(wr*100)+'% correct). A targeted practice set here would move your score most.</p></div>' : '';
  var review=a.map(function(x,i){
    var q=QUESTIONS.find(function(z){return z.id===x.qid;});
    var open=state.openReview===i;
    var detail = open ? '<div style="padding:0 14px 16px"><p style="font-size:14px;color:var(--muted)">'+esc(q.stem)+'</p><p style="font-size:14px;margin:4px 0"><b>Best answer '+q.answer+':</b> '+esc(q.fb.correct)+'</p><div class="pearl">&#128161; '+esc(q.fb.pearl)+'</div></div>' : '';
    return '<div style="border-top:1px solid var(--line)"><button class="opt" style="border:none;background:transparent" onclick="toggleReview('+i+')"><span class="chip" style="background:'+(x.correct?"var(--correct)":"var(--incorrect)")+';color:#fff;border-color:transparent">'+(x.correct?"&#10003;":"&#10007;")+'</span><span style="flex:1"><b>'+esc(GROUPS[x.group].label)+'</b> - '+esc(q.system)+'</span></button>'+detail+'</div>';
  }).join("");
  return '<div class="wrap">'
   +'<div class="eyebrow">'+(state.mode==="exam"?"Exam simulation":"Practice")+' complete</div>'
   +'<h1 style="font-size:28px;margin:8px 0 4px">Your result</h1>'
   +'<p style="color:var(--muted)">'+nCorrect+' of '+a.length+' correct &middot; ability estimate &theta; = '+theta.toFixed(2)+'</p>'
   +'<div class="card" style="padding:20px;margin-top:8px"><div class="eyebrow" style="margin-bottom:10px">Estimated AMC ability score</div>'+meterHTML(score)
   +'<p style="font-size:13px;color:var(--muted);margin-top:12px">Scored by ability, not raw count - harder items answered correctly raise the estimate more. (Illustrative mapping until items are calibrated on real responses.)</p></div>'
   +radarBlock+weakBlock
   +'<div class="card" style="padding:8px;margin-top:16px"><div class="eyebrow" style="padding:10px 12px 4px">Review every question</div>'+review+'</div>'
   +'<div style="display:flex;gap:12px;margin-top:20px"><button class="btn" onclick="again()">Practise again</button><button class="ghost" onclick="goHome()">Back to home</button></div>'
   +'</div>';
}

function render(){
  var app=document.getElementById("app");
  if(state.screen==="login") app.innerHTML=loginHTML();
  else if(state.screen==="home"){app.innerHTML=homeHTML();animateMeters();}
  else if(state.screen==="run") app.innerHTML=runHTML();
  else if(state.screen==="results"){app.innerHTML=resultsHTML();animateMeters();}
}
function animateMeters(){ setTimeout(function(){ var els=document.querySelectorAll(".meter-fill"); els.forEach(function(el){el.style.width=el.getAttribute("data-w")+"%";}); },60); }

/* ============================ ACTIONS ============================ */
function continueLogin(){var v=document.getElementById("emailInput").value;state.user=v||"candidate";state.screen="home";render();}
function guestLogin(){state.user="guest";state.screen="home";render();}
function signOut(){state.user=null;state.last=null;state.screen="login";render();}
function pickNext(){
  var theta=estimateTheta(state.answered.map(function(a){return {b:a.b,correct:a.correct};})).theta;
  var seen={}; state.answered.forEach(function(a){seen[a.group]=(seen[a.group]||0)+1;});
  state.current=selectNext(state.answered,theta,state.mode,seen);
}
function startMode(m){state.mode=m;state.answered=[];state.choice=null;state.revealed=false;state.openReview=null;pickNext();state.screen="run";render();}
function selectOpt(id){if(state.mode==="practice"&&state.revealed)return;state.choice=id;render();}
function submit(){
  if(!state.choice)return;
  if(state.mode==="practice"&&!state.revealed){state.revealed=true;render();return;}
  var q=state.current,correct=state.choice===q.answer;
  state.answered.push({qid:q.id,group:q.group,b:q.difficulty,correct:correct,choice:state.choice});
  state.choice=null;state.revealed=false;
  if(state.mode==="exam"&&state.answered.length>=examLen){finish();return;}
  pickNext();
  if(!state.current){finish();return;}
  render();
}
function finish(){var th=estimateTheta(state.answered.map(function(a){return {b:a.b,correct:a.correct};})).theta;state.last={mode:state.mode,score:thetaToScore(th)};state.screen="results";render();}
function quit(){ if(state.mode==="practice"&&state.answered.length){finish();} else {state.screen="home";render();} }
function again(){startMode(state.mode);}
function goHome(){state.screen="home";render();}
function toggleReview(i){state.openReview=state.openReview===i?null:i;render();}

render();
</script>
